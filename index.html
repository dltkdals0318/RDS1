<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Eyes on the Road</title>
    <link rel="preconnect" href="https://cdn.jsdelivr.net" />
    <link rel="stylesheet" href="css/global.css" />
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <header>
      <h1 id="site-title"></h1>
      <p id="site-desc"></p>
    </header>

    <section class="about">
      <p id="about-text"></p>
    </section>

    <nav class="filter-bar">
      <button class="filter-pill active" id="filter-all">전체</button>
      <div class="filter-group" id="filter-group-cat"></div>
      <div class="filter-group sort-group">
        <span class="sort-label">수치</span>
        <button
          class="filter-pill sort-pill"
          data-sort="calc-desc"
          title="높은순"
        >
          ↑
        </button>
        <button
          class="filter-pill sort-pill"
          data-sort="calc-asc"
          title="낮은순"
        >
          ↓
        </button>
        <span class="sort-label">날짜</span>
        <button
          class="filter-pill sort-pill"
          data-sort="date-desc"
          title="최신순"
        >
          ↑
        </button>
        <button
          class="filter-pill sort-pill"
          data-sort="date-asc"
          title="오래된순"
        >
          ↓
        </button>
      </div>
    </nav>

    <section class="works">
      <div id="grid"></div>
    </section>

    <script src="js/main.js" defer></script>
  </body>
</html>
